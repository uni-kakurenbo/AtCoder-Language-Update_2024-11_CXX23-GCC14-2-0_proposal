name: Expand template
run-name: ${{ github.workflow }} (${{ github.ref_name }})

on:
    push:
        branches:
            - main
            - test/**
    pull_request:
    workflow_dispatch:
        inputs:
            test-mode:
                description: "Test mode"
                required: true
                default: "normal"
                type: choice
                options:
                    - none
                    - normal
#                     - strict

concurrency:
    group: |
        test-${{
            startsWith(github.ref_name, 'test') && github.ref_name ||
            github.run_id
        }}
    cancel-in-progress: true

jobs:
    prepare-tools:
        name: Prepare Tools
        runs-on: ${{ vars.RUNNER_IMAGE }}

        outputs:
            cache-primary-key: ${{ steps.load-cached-binary.outputs.cache-primary-key }}

        steps:
            - name: Load Cached Binary
              id: load-cached-binary
              uses: actions/cache/restore@v4
              with:
                  path: /opt/ac_tools/
                  key: tools-${{ hashFiles('./.github/workflows/internal/tools/**') }}
                  restore-keys: tools-

            - name: Build
              run: |
                  sudo cp -rf /opt/ac_tools/** /usr/bin/

                  ./.github/workflows/internal/prepare.sh

                  which pkg-config dasel jq taplo | xargs -I {} cp {} /opt/ac_tools/

            - name: Cache Binary
              uses: actions/cache/save@v4
              if: (!cancelled()) && steps.load-cached-binary.outputs.cache-hit != 'true'
              with:
                  path: /opt/ac_tools/
                  key: ${{ steps.load-cached-binary.outputs.cache-primary-key }}

    gen-installer:
        name: Generate Installers
        needs: prepare-tools
        runs-on: ${{ vars.RUNNER_IMAGE }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref_name }}

            - name: Load Cached Tools
              uses: actions/cache/restore@v4
              with:
                  path: /opt/ac_tools/
                  key: tools-${{ needs.prepare-tools.outputs.cache-primary-key }}
                  restore-keys: tools-

            - name: Apply Tools
              run: sudo cp -rf /opt/ac_tools/** /usr/bin/

            - name: Expand
              run: ./.github/workflows/internal/expanders/installer.sh

            - name: Upload
              uses: actions/upload-artifact@v4
              with:
                  name: installers
                  path: ./dist/

    install:
        name: Install Libraries
        needs: gen-installer

        runs-on: ${{ vars.RUNNER_IMAGE }}

        # strategy:
        #   matrix:
        #     target: [ Abseil, AcLibrary, Boost, Eigen, GMP, LibTorch, LightGBM, OrTools, RangeV3, UnorderedDense, Z3 ]
        #   fail-fast: false

        steps:
            - name: Download Installers
              uses: actions/download-artifact@v4
              with:
                  name: installers
                  path: ./dist/

            - name: Collect Workflow Telemetry
              uses: catchpoint/workflow-telemetry-action@v2
              with:
                  theme: dark

            - name: Load CCache
              if: ${{ github.event.inputs.test-mode != 'strict' }}
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  create-symlink: true

            - name: Load Cached Installation
              id: load-cached-install
              if: ${{ github.event.inputs.test-mode != 'strict' }}
              uses: actions/cache/restore@v4
              with:
                  path: /tmp/ac_install/
                  key: build-${{ hashFiles('./src/**') }}
                  restore-keys: build-
                  # key: build-${{ matrix.target }}-${{ hashFiles('./src/**') }}
                  # restore-keys: build-${{ matrix.target }}-

            - name: Install Libraries
              env:
                  RUN_TEST: ${{ github.event.inputs.test-mode == 'strict' }}
              run: |
                  ./dist/install.sh

                  ls /opt/
                  ls /opt/ac_install/

                  du -sh /opt/ac_install/

            - name: Cache Installation
              uses: actions/cache/save@v4
              if: (!cancelled()) && steps.load-cached-install.outputs.cache-hit != 'true'
              with:
                  path: /tmp/ac_install/
                  key: ${{ steps.load-cached-install.outputs.cache-primary-key }}

            # - name: Collect Pkgconfig Files
            #   run: |
            #       find /opt/ac_install/ -name *.pc -type f -print 0 |
            #         xargs -0 -I {} sudo cp {} ./dist/pkgconfig/

            # - name: Upload Pkgconfig Files
            #   uses: actions/upload-artifact@v4
            #   with:
            #       name: pkgconfig
            #       path: ./dist/pkgconfig/

            - name: Upload Libraries
              uses: actions/upload-artifact@v4
              with:
                  name: libraries
                  path: /opt/ac_install/
                  compression-level: 9

    gen-config:
        name: Generate Compiler & Configuration File
        needs: install
        runs-on: ${{ vars.RUNNER_IMAGE }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref_name }}

            - name: Download Libraries
              uses: actions/download-artifact@v4
              with:
                  name: libraries
                  path: /opt/ac_install/

            - name: Load Cached Tools
              uses: actions/cache/restore@v4
              with:
                  path: /opt/ac_tools/
                  key: tools-${{ needs.prepare-tools.outputs.cache-primary-key }}
                  restore-keys: tools-

            - name: Apply Tools
              run: sudo cp -rf /opt/ac_tools/** /usr/bin/

            - name: Expand Compiler
              run: ./.github/workflows/internal/expanders/compiler.sh

            - name: Expand Configuration File
              run: ./.github/workflows/internal/expanders/config.sh

            - name: Lint
              run: ./.github/workflows/internal/lint.sh

            - name: Test
              if: github.event.inputs.test-mode != 'none'
              run: ./.github/workflows/internal/test.sh

            - name: Upload
              uses: actions/upload-artifact@v4
              with:
                  name: config

    push:
        name: Push to Repository
        needs: gen-config
        if: (!cancelled())
        runs-on: ${{ vars.RUNNER_IMAGE }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref_name }}
                  fetch-depth: 0
                  ssh-key: ${{ secrets.SSH_KEY }}

            - name: Download Installers
              uses: actions/download-artifact@v4
              with:
                  name: installers
                  path: ./dist/

            - name: Download Compiler & Configuration File
              uses: actions/download-artifact@v4
              with:
                  name: config
                  path: ./dist/

            - name: Push
              if: (!cancelled()) && github.ref_name == 'main'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -eu

                  git remote set-url origin git@github.com:${GITHUB_REPOSITORY}.git

                  git config --global user.name "Template Expander"
                  git config --global user.email "noreply@example.com"

                  git add -f ./dist/

                  if (git diff --cached --shortstat | grep '[0-9]'); then
                    git commit -m "[workflow] expand templates ${GITHUB_SHA}"

                    REPOSITORY_NAME="${{ github.head_ref || github.ref_name }}"

                    git pull --rebase origin "${REPOSITORY_NAME}"
                    git push origin "HEAD:${REPOSITORY_NAME}"
                  else
                    echo "No updated files."
                  fi
                  path: ./dist/

    dump:
        name: Dump
        needs: gen-config
        if: (!cancelled())
        runs-on: ${{ vars.RUNNER_IMAGE }}

        steps:
            - name: Download Outputs
              uses: actions/download-artifact@v4
              with:
                  name: outputs
                  path: ./dist/

            - name: Download Installers
              uses: actions/download-artifact@v4
              with:
                  name: installers
                  path: ./dist/

            - name: Download Compiler & Configuration File
              uses: actions/download-artifact@v4
              with:
                  name: config
                  path: ./dist/

            - name: Dump
              working-directory: ./dist/
              run: |
                  {
                    echo "# Outputs"

                    if [ -f ./install.sh ]; then
                      echo '## `install.sh`'
                      echo '```bash'
                      cat ./install.sh
                      echo '```'
                    fi

                    if [ -f ./compile.sh ]; then
                      echo '## `compile.sh`'
                      echo '```bash'
                      cat ./compile.sh
                      echo '```'
                    fi

                    if [ -f ./install.toml ]; then
                      echo '## `install.toml`'
                      echo '```toml'
                      cat ./install.toml
                      echo '```'
                    fi
                  }> ${GITHUB_STEP_SUMMARY}
